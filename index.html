<!doctype html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
        <link rel="stylesheet" href="style.css" />
        <script src="gameScript.js"></script>
        <title>Airplane fighter</title>
    </head>
    <body>
        <table id="gameInfoTable">
            <tr>
                <td class="infoCell">SCORE: 0</td>
            </tr>
            <tr>
                <td class="infoCell">BEST SCORE: 0</td>
            </tr>
            <tr>
                <td class="infoCell">OBJECTS DESTROYED: 0</td>
            </tr>
            <tr>
                <td class="infoCell">OBJECTS PASSED: 0</td>
            </tr>
            <tr>
                <td class="startPauseCell"><button class="btn btn-primary" type="button" id="startPauseButton" onclick="startPauseGame()">START</button></td>
            </tr>
        </table>
        <img src="Images/airplane.png" id="airplane"/>
        <img src="Images/asteroid.png" id="asteroid">
    </body>
</html>
